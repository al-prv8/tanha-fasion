version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: tanha-minio
    restart: always
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-admin12345}

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tanha-backend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - backend-uploads:/app/uploads
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - minio
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://tanhafashion.com}
    container_name: tanha-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    container_name: tanha-db
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tanha123}
      POSTGRES_DB: ${POSTGRES_DB:-tanha_db}

volumes:
  minio-data:
    driver: local
  backend-uploads:
    driver: local
  postgres-data:
    driver: local
