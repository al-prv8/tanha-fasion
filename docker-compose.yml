version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: tanha-minio
    restart: always
    network_mode: "host"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001" --address ":9000"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-admin12345}

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tanha-backend
    restart: always
    network_mode: "host"
    volumes:
      - backend-uploads:/app/uploads
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - minio

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://tanhafashion.com}
    container_name: tanha-frontend
    restart: always
    network_mode: "host"
    environment:
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - backend

volumes:
  minio-data:
    driver: local
  backend-uploads:
    driver: local
